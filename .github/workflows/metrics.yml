name: GitHub Metrics

on:
  # 每天 UTC 0 点自动运行
  schedule:
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Serein1202
          template: classic
          base: header
          config_display: large
          config_animations: false

      - name: Commit and push metrics SVG
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-metrics.svg github-metrics.plugin.languages.svg || true
          git commit -m "Update GitHub metrics" || exit 0
          git push
